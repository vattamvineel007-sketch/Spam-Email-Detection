<!DOCTYPE html>
<html>
<head>
    <title>Spam Email Detection</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1d2671, #c33764);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            animation: fadeIn 0.5s ease-in-out;
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #1d2671;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #c33764;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Spam Email Detection</h2>

    <textarea id="emailText" placeholder="Enter email text here..."></textarea>

    <br>
    <button onclick="checkSpam()">Check</button>

    <div id="result"></div>
</div>

<script>
function checkSpam() {
    let text = document.getElementById("emailText").value;

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {
        let resultDiv = document.getElementById("result");

        if (data.prediction === 1) {
            resultDiv.innerText = "⚠ Spam Email";
            resultDiv.style.color = "red";
        } else {
            resultDiv.innerText = "✅ Not Spam";
            resultDiv.style.color = "green";
        }
    });
}
</script>

</body>
</html>
